services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: notification_db
      _JAVA_OPTIONS: -Duser.timezone=Asia/Kolkata
    ports:
      - "15432:5432"

  # 2. Apache Kafka (KRaft mode - no zookeeper needed! - kafka version > 3.0)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092' # Clients can communicate with the broker using these addresses
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker:9093 # For internal communication between brokers and controllers
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Crucial KRaft additions/fixes below:
      CLUSTER_ID: '4L62ydgTyN-Gg90vHoc69A'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
    # Map the internal data directory to a named volume, so that topics will be persisted even if the container is removed. This is crucial for KRaft mode, as topics are stored in the broker's data directory.
    volumes:
      - kafka-storage:/var/lib/kafka/data
  redis:
    image: redis:7.2-alpine
    container_name: notification_redis
    ports:
      - "6379:6379"
    restart: always
  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    ports:
      - "8001:5540"
    depends_on:
      - redis
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources

volumes:
  kafka-storage:
  grafana-storage: